---
- hosts: leafs
  connection: local
  gather_facts: no

  tasks:
  - name: Configure Customer Vrf
    eos_config:
      src: customer_vrf.j2

  - name: Configure Customer L3 VxLAN
    eos_config:
      src: customer_l3vxlan.j2

  - name: Configure Customer Vlans
    eos_config:
      src: customer_vlans.j2

  - name: Configure Customer Svis
    eos_config:
      src: customer_svi.j2

  - name: Configure Customer L2 VxLAN
    eos_config:
      src: customer_l2vxlan.j2

  - name: Configure Customer L2 BGP
    eos_config:
      src: customer_l2bgp.j2

  - name: Configure Customer L3 BGP
    eos_config:
      src: customer_l3bgp.j2
  